[project]
name = "radio-server"
version = "0.1.0"
description = "Control a ham radio over one HTTP/WebSocket API with DTMF-authenticated voice services."
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["pyotp>=2.9"]

[dependency-groups]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["radio_server"]

[tool.pytest.ini_options]
testpaths = ["tests"]
